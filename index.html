<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library for The Odin Code Zone</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="root">
        <div class="header">
            <h1>Library for PeintnerFamilySites</h1>
            <button class="addBook">Add Book</button>
            <div class="formContainer inactive">
                <form class="addBookForm">
                    <p>Add Book</p>
                    <label for="title">Title:</label>
                    <input type="text" id="title" name="title" required>
                    <label for="author">Author:</label>
                    <input type="text" id="author" name="author" required>
                    <label for="pages">Pages:</label>
                    <input type="number" id="pages" name="pages" required>
                    <label for="read">Read:<input type="checkbox" id="read" name="read"></label>
                    <button type="submit">Add Book to Library</button>
                </form> 
            </div>
        </div>
        <div class="main">
            <div class="library">
                <!-- Books will be displayed here -->
            </div>      
        </div>
        
    </div>
</body>
</html>
